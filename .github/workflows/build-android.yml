name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool libltdl-dev \
            pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            ccache

      - name: Install Buildozer
        run: |
          pip install --user buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Build with Buildozer
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          which java
          java -version
          buildozer android debug --verbose 2>&1 | tee buildozer-output.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: calc-apk
          path: bin/*.apk

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-build-log
          path: buildozer-output.log

      - name: Upload .buildozer log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-state
          path: |
            buildozer-output.log
            ~/.buildozer/android/platform/build*/build.log
            ~/.buildozer/android/platform/python-for-android/build/**/build.log
          retention-days: 3
